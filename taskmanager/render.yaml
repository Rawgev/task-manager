services:
  - type: web
    name: taskmanager-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: DNS_SERVERS
        value: 8.8.8.8,1.1.1.1
      - key: MONGO_TIMEOUT_MS
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
